<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Content Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --off-white: #fafafa;
  --surface: #f5f5f7;
  --surface-2: #ebebeb;
  --ink: #1d1d1f;
  --ink-2: #6e6e73;
  --ink-3: #aeaeb2;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.14);
  --accent: #0071e3;
  --accent-soft: rgba(0,113,227,0.08);
  --green: #1a8c5e;
  --green-soft: #eaf5f0;
  --blue: #0071e3;
  --blue-soft: #e8f1fb;
  --amber: #b87900;
  --amber-soft: #fdf3e0;
  --violet: #5e5ce6;
  --violet-soft: #efeefd;
  --red: #d70015;
  --r: 12px;
  --r-lg: 18px;
  --r-xl: 24px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
  --font: 'DM Sans', -apple-system, sans-serif;
  --font-display: 'DM Serif Display', Georgia, serif;
  --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

html { -webkit-font-smoothing: antialiased; }
body { font-family: var(--font); background: var(--off-white); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.5; }

/* ── PASSWORD SCREEN ── */
#lock-screen {
  position: fixed; inset: 0; background: var(--white);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 24px;
  animation: fadeIn 0.4s var(--ease);
}
.lock-card {
  width: 100%; max-width: 360px;
  display: flex; flex-direction: column; align-items: center; gap: 0;
}
.lock-icon {
  width: 56px; height: 56px; border-radius: 16px;
  background: var(--ink); display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
}
.lock-icon svg { width: 24px; height: 24px; fill: white; }
.lock-title {
  font-family: var(--font-display); font-size: 28px; font-weight: 400;
  color: var(--ink); text-align: center; margin-bottom: 8px; letter-spacing: -0.3px;
}
.lock-subtitle {
  font-size: 14px; color: var(--ink-2); text-align: center;
  margin-bottom: 36px; line-height: 1.6;
}
.lock-input-wrap { width: 100%; position: relative; margin-bottom: 12px; }
.lock-input {
  width: 100%; padding: 14px 18px; font-size: 15px; font-family: var(--font);
  background: var(--surface); border: 1.5px solid transparent;
  border-radius: var(--r); color: var(--ink); outline: none;
  transition: border-color 0.2s, background 0.2s;
  letter-spacing: 0.08em;
}
.lock-input:focus { background: var(--white); border-color: var(--accent); }
.lock-input.error { border-color: var(--red); background: #fff5f5; }
.lock-error {
  font-size: 12px; color: var(--red); text-align: center;
  height: 16px; margin-bottom: 16px; transition: opacity 0.2s;
}
.lock-btn {
  width: 100%; padding: 14px; font-size: 15px; font-weight: 500;
  font-family: var(--font); background: var(--ink); color: white;
  border: none; border-radius: var(--r); cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.lock-btn:hover { opacity: 0.88; }
.lock-btn:active { transform: scale(0.98); }

/* ── LOADING ── */
#loading-overlay {
  position: fixed; inset: 0; background: var(--white);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; z-index: 900; font-size: 13px; color: var(--ink-3);
}
.spinner {
  width: 22px; height: 22px;
  border: 1.5px solid var(--border-strong); border-top-color: var(--ink);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}

/* ── MAIN APP ── */
#main-app { display: none; min-height: 100vh; }

.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
}

.topbar-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.app-wordmark { font-family: var(--font-display); font-size: 17px; color: var(--ink); letter-spacing: -0.2px; white-space: nowrap; }

.view-pills {
  display: flex; background: var(--surface); border-radius: 8px; padding: 2px; gap: 1px;
}
.vpill {
  padding: 5px 14px; font-size: 13px; font-weight: 400; font-family: var(--font);
  background: transparent; border: none; border-radius: 6px;
  color: var(--ink-2); cursor: pointer; transition: all 0.15s;
}
.vpill.active { background: var(--white); color: var(--ink); font-weight: 500; box-shadow: var(--shadow-sm); }

.nav-cluster { display: flex; align-items: center; gap: 6px; }
.nav-arrow {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid var(--border-strong); border-radius: 7px;
  color: var(--ink); cursor: pointer; font-size: 15px; transition: background 0.15s;
  font-family: var(--font);
}
.nav-arrow:hover { background: var(--surface); }
.period-lbl { font-size: 13px; font-weight: 500; color: var(--ink); min-width: 120px; text-align: center; }
.today-pill {
  padding: 5px 12px; font-size: 12px; font-weight: 500; font-family: var(--font);
  background: transparent; border: 1px solid var(--border-strong); border-radius: 7px;
  color: var(--ink-2); cursor: pointer; transition: background 0.15s;
}
.today-pill:hover { background: var(--surface); color: var(--ink); }

.topbar-right { display: flex; align-items: center; gap: 10px; }
.sync-pip { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink-3); }
.pip { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-3); transition: background 0.3s; }
.pip.live { background: #34c759; }

.add-entry-btn {
  height: 32px; padding: 0 16px; font-size: 13px; font-weight: 500; font-family: var(--font);
  background: var(--ink); color: white; border: none; border-radius: 8px; cursor: pointer;
  transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
}
.add-entry-btn:hover { opacity: 0.82; }
.add-entry-btn:active { transform: scale(0.97); }

/* ── BODY ── */
.cal-body { max-width: 1280px; margin: 0 auto; padding: 20px 24px; }

.legend-row { display: flex; gap: 20px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; color: var(--ink-2); letter-spacing: 0.04em; text-transform: uppercase; }
.ldot { width: 6px; height: 6px; border-radius: 50%; }

/* ── STATS BAR ── */
.stats-bar {
  display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
}
.stat-card {
  display: flex; align-items: center; gap: 10px;
  background: var(--white); border-radius: var(--r);
  border: 1px solid var(--border); padding: 12px 16px;
  flex: 1; min-width: 140px;
  box-shadow: var(--shadow-sm);
}
.stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.stat-info { display: flex; flex-direction: column; gap: 1px; }
.stat-num { font-size: 22px; font-weight: 300; color: var(--ink); letter-spacing: -0.5px; line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--ink-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

/* ── MONTH GRID ── */
.month-grid {
  display: grid; grid-template-columns: repeat(7, minmax(0,1fr));
  background: var(--border); border-radius: var(--r-xl);
  overflow: hidden; gap: 1px;
  box-shadow: var(--shadow);
}
.col-header {
  background: var(--white); padding: 10px 14px;
  font-size: 10px; font-weight: 500; color: var(--ink-3);
  letter-spacing: 0.1em; text-transform: uppercase;
}
.day-cell {
  background: var(--white); min-height: 116px; padding: 10px 12px;
  cursor: pointer; transition: background 0.12s; position: relative;
}
.day-cell:hover { background: var(--off-white); }
.day-cell.dim { background: var(--surface); }
.day-cell.dim .dnum { color: var(--ink-3); }
.day-cell.is-today { background: var(--white); }
.dnum {
  font-size: 12px; font-weight: 400; color: var(--ink-2);
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; margin-bottom: 6px;
}
.day-cell.is-today .dnum { background: var(--ink); color: white; font-weight: 500; }

/* ── WEEK GRID ── */
.week-grid {
  background: var(--border); border-radius: var(--r-xl);
  overflow: hidden; gap: 1px;
  box-shadow: var(--shadow);
  display: flex; flex-direction: column;
}
.week-header-row { display: grid; grid-template-columns: 80px repeat(7, minmax(0,1fr)); gap: 1px; }
.week-body-row { display: grid; grid-template-columns: 80px repeat(7, minmax(0,1fr)); gap: 1px; }
.week-corner { background: var(--white); }
.week-col-hdr { background: var(--white); padding: 10px 8px; text-align: center; }
.wch-name { font-size: 10px; font-weight: 500; color: var(--ink-3); letter-spacing: 0.1em; text-transform: uppercase; }
.wch-num { font-size: 20px; font-weight: 300; color: var(--ink); margin-top: 2px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 4px auto 0; }
.wch-num.is-today { background: var(--ink); color: white; }
.week-type-lbl {
  background: var(--white); padding: 0 14px;
  display: flex; align-items: center; justify-content: flex-end;
  font-size: 10px; font-weight: 500; color: var(--ink-3);
  letter-spacing: 0.08em; text-transform: uppercase;
}
.week-cell { background: var(--white); padding: 8px; min-height: 88px; cursor: pointer; transition: background 0.12s; }
.week-cell:hover { background: var(--off-white); }
.week-cell.is-today-col { background: #fafff9; }

/* ── ENTRIES ── */
.entry {
  display: flex; align-items: center; gap: 5px;
  border-radius: 6px; padding: 4px 7px; margin-bottom: 3px;
  cursor: pointer; transition: opacity 0.12s; overflow: hidden;
}
.entry:hover { opacity: 0.78; }
.edot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.etitle { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.more-tag { font-size: 10px; color: var(--ink-3); padding: 2px 6px; }

.e-publish { background: var(--green-soft); color: var(--green); }
.e-publish .edot { background: var(--green); }
.e-film { background: var(--blue-soft); color: var(--blue); }
.e-film .edot { background: var(--blue); }
.e-edit { background: var(--amber-soft); color: var(--amber); }
.e-edit .edot { background: var(--amber); }
.e-plan { background: var(--violet-soft); color: var(--violet); }
.e-plan .edot { background: var(--violet); }

/* ── MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.24);
  display: flex; align-items: center; justify-content: center;
  z-index: 500; padding: 24px;
  animation: fadeIn 0.18s var(--ease);
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--white); border-radius: var(--r-xl);
  width: 100%; max-width: 440px; padding: 28px;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.22s var(--ease);
}
.modal-hd { font-size: 17px; font-weight: 500; color: var(--ink); margin-bottom: 22px; letter-spacing: -0.2px; }

.field { margin-bottom: 16px; }
.field-label { font-size: 11px; font-weight: 500; color: var(--ink-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; display: block; }
.field input, .field textarea {
  width: 100%; padding: 11px 14px; font-size: 14px; font-family: var(--font);
  background: var(--surface); border: 1.5px solid transparent; border-radius: var(--r);
  color: var(--ink); outline: none; transition: border-color 0.18s, background 0.18s;
}
.field input:focus, .field textarea:focus { background: var(--white); border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

.type-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.tchip {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
  font-family: var(--font); cursor: pointer; border: 1.5px solid transparent;
  transition: all 0.15s;
}
.tchip-unsel { background: var(--surface); color: var(--ink-2); border-color: transparent; }
.tchip-publish { background: var(--green-soft); color: var(--green); border-color: var(--green); }
.tchip-film { background: var(--blue-soft); color: var(--blue); border-color: var(--blue); }
.tchip-edit { background: var(--amber-soft); color: var(--amber); border-color: var(--amber); }
.tchip-plan { background: var(--violet-soft); color: var(--violet); border-color: var(--violet); }

.modal-footer { display: flex; align-items: center; gap: 8px; margin-top: 24px; }
.mf-spacer { flex: 1; }
.btn-ghost {
  padding: 9px 16px; font-size: 13px; font-weight: 400; font-family: var(--font);
  background: transparent; border: 1px solid var(--border-strong); border-radius: var(--r);
  color: var(--ink-2); cursor: pointer; transition: background 0.15s;
}
.btn-ghost:hover { background: var(--surface); }
.btn-primary {
  padding: 9px 20px; font-size: 13px; font-weight: 500; font-family: var(--font);
  background: var(--ink); color: white; border: none; border-radius: var(--r);
  cursor: pointer; transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.82; }
.btn-danger {
  padding: 9px 16px; font-size: 13px; font-weight: 400; font-family: var(--font);
  background: transparent; border: 1px solid rgba(215,0,21,0.25); border-radius: var(--r);
  color: var(--red); cursor: pointer; transition: background 0.15s;
}
.btn-danger:hover { background: #fff5f5; }

/* Detail modal */
.detail-type-tag {
  display: inline-flex; align-items: center; gap: 5px;
  border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 500;
  margin-bottom: 12px;
}
.detail-title { font-family: var(--font-display); font-size: 22px; color: var(--ink); margin-bottom: 6px; line-height: 1.3; letter-spacing: -0.2px; }
.detail-date { font-size: 13px; color: var(--ink-3); margin-bottom: 14px; }
.detail-notes { font-size: 13px; color: var(--ink-2); background: var(--surface); border-radius: var(--r); padding: 12px 14px; line-height: 1.7; }


/* ── MOBILE ── */
@media (max-width: 600px) {
  .cal-body { padding: 12px 12px; }
  .topbar { padding: 10px 14px; }
  .app-wordmark { font-size: 15px; }
  .nav-cluster { gap: 4px; }
  .period-lbl { min-width: 90px; font-size: 12px; }
  .sync-pip { display: none; }
  .stat-card { padding: 10px 12px; min-width: 120px; }
  .stat-num { font-size: 18px; }
  .day-cell { min-height: 72px; padding: 6px 5px; }
  .dnum { font-size: 11px; width: 20px; height: 20px; margin-bottom: 3px; }
  .entry { padding: 3px 5px; border-radius: 5px; margin-bottom: 2px; }
  .edot { width: 4px; height: 4px; }
  .etitle { font-size: 10px; }
  .col-header { padding: 7px 4px; font-size: 9px; letter-spacing: 0.06em; }
  .legend-row { gap: 12px; margin-bottom: 12px; }
  .legend-item { font-size: 10px; }
  .stats-bar { gap: 8px; }
  .week-type-lbl { font-size: 9px; padding: 0 8px; }
  .week-cell { padding: 5px; min-height: 60px; }
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
    </div>
    <div class="lock-title">Content Calendar</div>
    <div class="lock-subtitle">Enter your team password to continue.</div>
    <div class="lock-input-wrap">
      <input class="lock-input" type="password" id="pw-input" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')checkPassword()"/>
    </div>
    <div class="lock-error" id="pw-error"></div>
    <button class="lock-btn" onclick="checkPassword()">Continue</button>
  </div>
</div>

<!-- LOADING -->
<div id="loading-overlay" style="display:none;">
  <div class="spinner"></div>
  <span>Loading…</span>
</div>

<!-- MAIN APP -->
<div id="main-app">
  <nav class="topbar">
    <div class="topbar-left">
      <span class="app-wordmark">Content Calendar</span>
      <div class="view-pills">
        <button class="vpill active" id="vp-month" onclick="setView('month')">Month</button>
        <button class="vpill" id="vp-week" onclick="setView('week')">Week</button>
      </div>
      <div class="nav-cluster">
        <button class="nav-arrow" onclick="navigate(-1)">&#8249;</button>
        <span class="period-lbl" id="period-lbl"></span>
        <button class="nav-arrow" onclick="navigate(1)">&#8250;</button>
        <button class="today-pill" onclick="goToday()">Today</button>
      </div>
    </div>
    <div class="topbar-right">
      <div class="sync-pip">
        <div class="pip" id="sync-pip"></div>
        <span id="sync-lbl">Connecting</span>
      </div>
      <button class="add-entry-btn" onclick="openAdd()">+ New entry</button>
    </div>
  </nav>

  <div class="cal-body">
    <div class="legend-row">
      <div class="legend-item"><div class="ldot" style="background:var(--green)"></div>Publish</div>
      <div class="legend-item"><div class="ldot" style="background:var(--blue)"></div>Film</div>
      <div class="legend-item"><div class="ldot" style="background:var(--amber)"></div>Edit</div>
      <div class="legend-item"><div class="ldot" style="background:var(--violet)"></div>Plan</div>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
    <div id="cal-view"></div>
  </div>
</div>

<div id="modal-root"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
// ── CONFIG ──────────────────────────────────────────
const TEAM_PASSWORD = 'studio2026';   // ← change this to your own password

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyD_xEWNkVS590NZxBTcTG9Pb56st4Glkek",
  authDomain: "contentcalendar-daiyinchi.firebaseapp.com",
  databaseURL: "https://contentcalendar-daiyinchi-default-rtdb.firebaseio.com",
  projectId: "contentcalendar-daiyinchi"
};
// ────────────────────────────────────────────────────

const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

let currentDate = new Date();
let currentView = 'month';
let entries = {};
let db = null;
let modalState = null;

// ── PASSWORD ──
function checkPassword() {
  const val = document.getElementById('pw-input').value;
  const input = document.getElementById('pw-input');
  const err   = document.getElementById('pw-error');
  if(val === TEAM_PASSWORD) {
    sessionStorage.setItem('cal-auth','1');
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('loading-overlay').style.display = 'flex';
    initFirebase();
  } else {
    input.classList.add('error');
    err.textContent = 'Incorrect password. Try again.';
    input.value = '';
    setTimeout(() => { input.classList.remove('error'); err.textContent=''; }, 2500);
  }
}

// ── FIREBASE ──
function initFirebase() {
  try {
    const app = firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database(app);
    db.ref('calendar_entries').on('value', snap => {
      entries = snap.val() || {};
      document.getElementById('loading-overlay').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
      document.getElementById('sync-pip').className = 'pip live';
      document.getElementById('sync-lbl').textContent = 'Live';
      render();
    }, err => {
      document.getElementById('sync-pip').className = 'pip';
      document.getElementById('sync-lbl').textContent = 'Error';
    });
  } catch(e) {
    document.getElementById('loading-overlay').innerHTML = '<p style="color:red;padding:2rem;">Connection error. Please refresh.</p>';
  }
}

// boot: check session
window.addEventListener('DOMContentLoaded', () => {
  if(sessionStorage.getItem('cal-auth') === '1') {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('loading-overlay').style.display = 'flex';
    initFirebase();
  }
  document.getElementById('pw-input').focus();
});

// ── UTILS ──
function dateKey(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseKey(k) { const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function isToday(d) { const t=new Date(); return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function forDate(key) { return Object.values(entries).filter(e=>e.date===key); }
function typeLabel(t) { return {publish:'Publish',film:'Film',edit:'Edit',plan:'Plan'}[t]||t; }
function typeClass(t) { return 'e-'+t; }
function tchipClass(t,sel) { return sel?'tchip tchip-'+t:'tchip tchip-unsel'; }

// ── NAV ──
function setView(v) {
  currentView=v;
  document.getElementById('vp-month').className='vpill'+(v==='month'?' active':'');
  document.getElementById('vp-week').className='vpill'+(v==='week'?' active':'');
  render();
}
function navigate(dir) {
  if(currentView==='month') currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+dir,1);
  else currentDate=new Date(currentDate.getTime()+dir*7*86400000);
  render();
}
function goToday() { currentDate=new Date(); render(); }
function render() { currentView==='month'?renderMonth():renderWeek(); renderStats(); renderModal(); }

// ── STATS ──
function renderStats() {
  const year=currentDate.getFullYear(), month=currentDate.getMonth();
  const allVals = Object.values(entries);
  const inMonth = allVals.filter(e => {
    const d = parseKey(e.date);
    if(currentView==='month') return d.getFullYear()===year && d.getMonth()===month;
    // week view: show current month of the week displayed
    const wd = new Date(currentDate); wd.setDate(wd.getDate()-wd.getDay());
    return d.getFullYear()===wd.getFullYear() && d.getMonth()===wd.getMonth();
  });
  const publishCount = inMonth.filter(e=>e.type==='publish').length;
  const filmCount    = inMonth.filter(e=>e.type==='film').length;
  const editCount    = inMonth.filter(e=>e.type==='edit').length;
  const planCount    = inMonth.filter(e=>e.type==='plan').length;
  const periodName   = currentView==='month'
    ? MONTHS[month]
    : (()=>{const wd=new Date(currentDate);wd.setDate(wd.getDate()-wd.getDay());return MONTHS[wd.getMonth()];})();
  document.getElementById('stats-bar').innerHTML =
    statCard(publishCount, 'Publishing', 'var(--green)') +
    statCard(filmCount, 'Filming', 'var(--blue)') +
    statCard(editCount, 'Editing', 'var(--amber)') +
    statCard(planCount, 'Planning', 'var(--violet)');
}
function statCard(n, label, color) {
  return `<div class="stat-card">
    <div class="stat-dot" style="background:${color}"></div>
    <div class="stat-info">
      <div class="stat-num">${n}</div>
      <div class="stat-lbl">${label} this month</div>
    </div>
  </div>`;
}

// ── ENTRY HTML ──
function entryHtml(e) {
  return `<div class="entry ${typeClass(e.type)}" onclick="event.stopPropagation();showDetail('${e.id}')" title="${esc(e.title)}">
    <span class="edot"></span><span class="etitle">${esc(e.title)}</span></div>`;
}

// ── MONTH ──
function renderMonth() {
  const year=currentDate.getFullYear(), month=currentDate.getMonth();
  document.getElementById('period-lbl').textContent=MONTHS[month]+' '+year;
  const startDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const daysInPrev=new Date(year,month,0).getDate();
  let cells=[];
  for(let i=startDay-1;i>=0;i--) cells.push({d:new Date(year,month-1,daysInPrev-i),other:true});
  for(let d=1;d<=daysInMonth;d++) cells.push({d:new Date(year,month,d),other:false});
  let rem=7-(cells.length%7); if(rem===7) rem=0;
  for(let i=1;i<=rem;i++) cells.push({d:new Date(year,month+1,i),other:true});

  let html='<div class="month-grid">';
  DAYS.forEach(d=>html+=`<div class="col-header">${d}</div>`);
  cells.forEach(({d,other})=>{
    const key=dateKey(d), de=forDate(key), today=isToday(d);
    let cls='day-cell'+(other?' dim':'')+(today?' is-today':'');
    let inner=`<div class="dnum">${d.getDate()}</div>`;
    de.slice(0,3).forEach(e=>inner+=entryHtml(e));
    if(de.length>3) inner+=`<div class="more-tag">+${de.length-3} more</div>`;
    html+=`<div class="${cls}" onclick="openAdd('${key}')">${inner}</div>`;
  });
  html+='</div>';
  document.getElementById('cal-view').innerHTML=html;
}

// ── WEEK ──
function renderWeek() {
  const d=new Date(currentDate); d.setDate(d.getDate()-d.getDay());
  const wd=[]; for(let i=0;i<7;i++){wd.push(new Date(d));d.setDate(d.getDate()+1);}
  document.getElementById('period-lbl').textContent=
    MONTHS[wd[0].getMonth()]+' '+wd[0].getDate()+' – '+MONTHS[wd[6].getMonth()]+' '+wd[6].getDate()+', '+wd[6].getFullYear();

  const types=['publish','film','edit','plan'];
  const tl={publish:'Publish',film:'Film',edit:'Edit',plan:'Plan'};

  let html='<div class="week-grid"><div class="week-header-row"><div class="week-corner"></div>';
  wd.forEach(w=>{
    const t=isToday(w);
    html+=`<div class="week-col-hdr"><div class="wch-name">${DAYS[w.getDay()]}</div>
      <div class="wch-num${t?' is-today':''}">${w.getDate()}</div></div>`;
  });
  html+='</div>';
  types.forEach(type=>{
    html+=`<div class="week-body-row"><div class="week-type-lbl">${tl[type]}</div>`;
    wd.forEach(w=>{
      const key=dateKey(w), de=forDate(key).filter(e=>e.type===type), t=isToday(w);
      html+=`<div class="week-cell${t?' is-today-col':''}" onclick="openAdd('${key}','${type}')">`;
      de.forEach(e=>html+=entryHtml(e));
      html+='</div>';
    });
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('cal-view').innerHTML=html;
}

// ── MODALS ──
function openAdd(dateStr,type) { modalState={mode:'add',date:dateStr||dateKey(new Date()),type:type||'publish',title:'',notes:''}; renderModal(); }
function editEntry(id) { const e=entries[id]; if(!e)return; modalState={mode:'edit',id,date:e.date,type:e.type,title:e.title,notes:e.notes||''}; renderModal(); }
function showDetail(id) { modalState={mode:'detail',id}; renderModal(); }
function closeModal() { modalState=null; renderModal(); }
function setChip(t) { if(modalState){modalState.type=t;renderModal();} }

function renderModal() {
  const root=document.getElementById('modal-root');
  if(!modalState){root.innerHTML='';return;}

  if(modalState.mode==='detail') {
    const e=entries[modalState.id]; if(!e){root.innerHTML='';return;}
    const pd=parseKey(e.date);
    const ds=DAYS_SHORT[pd.getDay()]+', '+MONTHS[pd.getMonth()]+' '+pd.getDate()+', '+pd.getFullYear();
    root.innerHTML=`<div class="modal-backdrop" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="detail-type-tag e-${e.type}">${typeLabel(e.type)}</div>
        <div class="detail-title">${esc(e.title)}</div>
        <div class="detail-date">${ds}</div>
        ${e.notes?`<div class="detail-notes">${esc(e.notes)}</div>`:''}
        <div class="modal-footer">
          <button class="btn-danger" onclick="deleteEntry('${e.id}')">Delete</button>
          <div class="mf-spacer"></div>
          <button class="btn-ghost" onclick="closeModal()">Close</button>
          <button class="btn-primary" onclick="editEntry('${e.id}')">Edit</button>
        </div>
      </div></div>`;
    return;
  }

  const ms=modalState, isEdit=ms.mode==='edit';
  const types=['publish','film','edit','plan'];
  let chips='<div class="type-chips">';
  types.forEach(t=>chips+=`<button class="${tchipClass(t,ms.type===t)}" onclick="setChip('${t}')">${typeLabel(t)}</button>`);
  chips+='</div>';

  root.innerHTML=`<div class="modal-backdrop" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-hd">${isEdit?'Edit entry':'New entry'}</div>
      <div class="field"><label class="field-label">Type</label>${chips}</div>
      <div class="field"><label class="field-label">Date</label><input type="date" id="m-date" value="${ms.date}"/></div>
      <div class="field"><label class="field-label">Video title</label><input type="text" id="m-title" placeholder="e.g. How I set up my studio" value="${esc(ms.title)}"/></div>
      <div class="field"><label class="field-label">Notes</label><textarea id="m-notes" placeholder="Links, briefs, context…">${esc(ms.notes)}</textarea></div>
      <div class="modal-footer">
        ${isEdit?`<button class="btn-danger" onclick="deleteEntry('${ms.id}')">Delete</button>`:''}
        <div class="mf-spacer"></div>
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveEntry()">${isEdit?'Update':'Save'}</button>
      </div>
    </div></div>`;
}

function saveEntry() {
  const date=document.getElementById('m-date').value;
  const title=document.getElementById('m-title').value.trim();
  const notes=document.getElementById('m-notes').value.trim();
  if(!title){document.getElementById('m-title').focus();return;}
  if(modalState.mode==='edit') {
    db.ref('calendar_entries/'+modalState.id).update({date,title,notes,type:modalState.type});
  } else {
    const ref=db.ref('calendar_entries').push();
    ref.set({id:ref.key,date,title,notes,type:modalState.type});
  }
  closeModal();
}
function deleteEntry(id) { db.ref('calendar_entries/'+id).remove(); closeModal(); }
</script>
